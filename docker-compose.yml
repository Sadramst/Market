version: "3.8"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=appilico_market;Username=postgres;Password=postgres
      - Jwt__Key=dev-super-secret-key-that-is-at-least-32-chars!
      - Jwt__Issuer=appilico-market-api
      - Jwt__Audience=appilico-market-clients
      - Jwt__ExpiryMinutes=60
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: appilico_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # TODO: Add pgAdmin for database management
  # TODO: Add Nginx reverse proxy for production
  # TODO: Add Redis for caching and rate limiting
  # TODO: Add Elasticsearch for full-text search

volumes:
  postgres_data:
