# API reverse proxy — api.appilico.com.au
server {
    listen 80;
    listen 443 ssl http2;
    server_name api.appilico.com.au localhost 127.0.0.1;

    # SSL (optional - skip if certs don't exist)
    ssl_certificate /etc/letsencrypt/live/appilico.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appilico.com.au/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    error_page 497 =200 @fallback;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host api.appilico.com.au;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Stricter rate limit for auth endpoints
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host api.appilico.com.au;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static file uploads
    location /uploads/ {
        proxy_pass http://api:5000/uploads/;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://api:5000/health;
    }

    # Swagger (disable in production if needed)
    location /swagger {
        return 404;
    }
}
