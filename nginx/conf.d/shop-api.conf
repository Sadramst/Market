# Shop API reverse proxy — AppilicoShopServer
# shop-api.appilico.com.au -> shop-api:8080
#
# HTTP-only for now. After the DNS A record for shop-api.appilico.com.au points
# to this server and certbot issues a certificate, add the 443 server block
# (template kept at the bottom, commented out).
upstream shop_backend {
    server shop-api:8080;
}

# HTTP — ACME challenge + redirect
server {
    listen 80;
    listen [::]:80;
    server_name shop-api.appilico.com.au api.appilico.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — api.appilico.com → shop-api:8080
# Reuses the existing api.appilico.com.au certificate (same server IP)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.appilico.com;

    ssl_certificate     /etc/letsencrypt/live/api.appilico.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.appilico.com.au/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://shop_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
